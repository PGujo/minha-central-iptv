name: Roda Automação com Proxy

on:
  workflow_dispatch:  # Permite rodar manualmente na aba Actions
  schedule:
    - cron: '0 12 * * *' # Roda automaticamente todo dia às 12:00

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar Dependências
        run: |
          # Instalamos requests para buscar proxies e playwright para a automação
          pip install playwright requests PyGithub
          playwright install chromium
          playwright install-deps

      - name: Rodar script de captura
        run: python proxy.py

      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debug-proxy-results
          path: |
            debug_proxy_final.txt
            debug_visual.png
